name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarqube:
    name: Test & Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: write # to commit refreshed badge SVGs
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so SonarQube can attribute new code / blame correctly
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_URL || vars.SONAR_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || vars.SONAR_TOKEN }}

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_URL || vars.SONAR_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || vars.SONAR_TOKEN }}

      # Bake badge SVGs into the repo so the README can show them without
      # exposing the SonarQube server URL or badge token. Values are read from
      # the authenticated API and rendered as static shields.io SVGs.
      - name: Refresh badges
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_URL || vars.SONAR_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || vars.SONAR_TOKEN }}
        run: |
          bash scripts/gen-badges.sh
          git add .github/badges
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Update SonarQube badges [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
